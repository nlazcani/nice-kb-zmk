# ZMK cloud build matrix. Left = central (USB + ZMK Studio + trackball host).
# Board is nice_nano//zmk (Zephyr 4.1 renamed nice_nano_v2 -> nice_nano@2.0.0//zmk).
include:
  - board: nice_nano//zmk
    shield: nice_kb_left
    snippet: studio-rpc-usb-uart
    artifact-name: nice_kb_left
  - board: nice_nano//zmk
    shield: nice_kb_right
    artifact-name: nice_kb_right
  # flash this to wipe BLE bonds if pairing gets stuck
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: settings_reset
  # DEBUG: USB serial logging to watch PMW3610 init + motion (flash to sensor half)
  - board: nice_nano//zmk
    shield: nice_kb_left
    snippet: zmk-usb-logging
    artifact-name: nice_kb_left_debug
  # TEST: standalone (no split), BLE off, USB-only, force-awake — sensor+keys+RGB
  # force KEYMAP_FILE: ZMK otherwise globs config/*.keymap and picks nice_kb.keymap
  - board: nice_nano//zmk
    shield: nkbtest
    snippet: studio-rpc-usb-uart
    cmake-args: -DKEYMAP_FILE=/__w/nice-kb-zmk/nice-kb-zmk/config/nkbtest.keymap
    artifact-name: nkbtest
  # TEST+LOG: same, with USB serial logging
  - board: nice_nano//zmk
    shield: nkbtest
    snippet: zmk-usb-logging
    cmake-args: -DKEYMAP_FILE=/__w/nice-kb-zmk/nice-kb-zmk/config/nkbtest.keymap
    artifact-name: nkbtest_dbg
  # SCROLL test: scroll-snap (axis-lock). Hold key0 = scroll layer.
  - board: nice_nano//zmk
    shield: nkbscroll
    cmake-args: -DKEYMAP_FILE=/__w/nice-kb-zmk/nice-kb-zmk/config/nkbscroll.keymap
    artifact-name: nkbscroll
  # INERTIA test: forked scroll-inertia module ported to ZMK main. + Studio.
  - board: nice_nano//zmk
    shield: nkbinertia
    snippet: studio-rpc-usb-uart
    cmake-args: -DKEYMAP_FILE=/__w/nice-kb-zmk/nice-kb-zmk/config/nkbinertia.keymap
    artifact-name: nkbinertia

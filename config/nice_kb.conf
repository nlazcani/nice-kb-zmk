# ===== ZMK Studio (live keymap editing over USB, on central) =====
CONFIG_ZMK_STUDIO=y

# ===== Pointing / PMW3610 trackball =====
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# ===== Free NFC pins P0.09 (col3) & P0.10 (RGB) for GPIO =====
# Deprecated symbol but non-fatal (build tolerates it, like KSCAN).
# Without this P0.09 floats -> phantom key presses.
CONFIG_NFCT_PINS_AS_GPIOS=y

# ===== bring-up logging: sensor init + motion events =====
CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_INPUT_LOG_LEVEL_DBG=y
CONFIG_PMW3610_ALT_LOG_LEVEL_DBG=y
# delay sensor init 5s so its init/product-id logs print AFTER USB+PuTTY connect
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=5000

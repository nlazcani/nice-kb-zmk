# ===== ZMK Studio (live keymap editing over USB, on central) =====
CONFIG_ZMK_STUDIO=y

# ===== Pointing / PMW3610 trackball =====
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# ===== P0.09 (col3) and P0.10 (RGB) are NFC pins -> free them for GPIO =====
CONFIG_NFCT_PINS_AS_GPIOS=y

# ===== Debug: watch PMW3610 init + motion over USB serial =====
# open the COM port in PuTTY @115200. Turn OFF once the sensor is verified.
CONFIG_ZMK_USB_LOGGING=y

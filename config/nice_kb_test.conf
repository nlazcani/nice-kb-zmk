# Standalone USB-only sensor test — isolates lag causes:
#  - CONFIG_ZMK_SPLIT=n  -> no central scanning for a missing peripheral (suspect A)
#  - CONFIG_ZMK_BLE=n    -> radio fully off, pure USB HID (rules out all BLE)
#  - force-awake (overlay) -> no REST downshift (suspect B)
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

CONFIG_NFCT_PINS_AS_GPIOS=y

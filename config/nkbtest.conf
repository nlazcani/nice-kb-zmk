# Standalone USB-only bench test: trackball + 3 keys + RGB.
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

# trackball
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# NFC pins as GPIO (col3 = P0.09, RGB = P0.10)
CONFIG_NFCT_PINS_AS_GPIOS=y

# RGB underglow (SK6812 via WS2812-SPI). ws2812 driver auto-enables from the DT node.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y

# bring-up logging (harmless on the no-snippet build; active on _dbg)
CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_LED_STRIP_LOG_LEVEL_DBG=y

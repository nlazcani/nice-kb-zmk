# Standalone USB-only bench test: trackball + 3 keys + RGB.
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

# trackball
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y

# NFC pins as GPIO (col3 = P0.09, RGB = P0.10)
CONFIG_NFCT_PINS_AS_GPIOS=y

# RGB underglow (SK6812 via WS2812-SPI). ws2812 driver auto-enables from the DT node.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_LED_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
# solid color; each layer sets its own hue (L1 red / L2 green / L3 blue)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# ZMK Studio over USB (needs studio-rpc-usb-uart snippet in build.yaml)
CONFIG_ZMK_STUDIO=y

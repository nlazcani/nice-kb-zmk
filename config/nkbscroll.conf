# Standalone USB scroll test: trackball + scroll-snap.
CONFIG_ZMK_SPLIT=n
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610_ALT=y
CONFIG_NFCT_PINS_AS_GPIOS=y

# smoother scroll resolution on hosts that support it
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# ZMK Studio over USB (needs studio-rpc-usb-uart snippet in build.yaml)
CONFIG_ZMK_STUDIO=y
